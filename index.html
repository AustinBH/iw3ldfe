<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<style>
    /* Remove default browser margin and padding */
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden; /* Prevents scrollbars */
  }

  .full-page-img {
    width: 100vw;    /* 100% of the viewport width */
    height: 100vh;   /* 100% of the viewport height */
    object-fit: cover; /* Fills the area without stretching */
    display: block;  /* Removes the small gap at the bottom */
  }
</style>
</head>
  <img src="IMG_2776.JPEG" alt="Primary Background" class="full-page-img">
</html>
